<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NURU Bags — Create Account</title>
  <meta name="description" content="Create a new NURU Bags inventory system account." />
  <link rel="stylesheet" href="style.css?v=202605022" />
</head>
<body>
  <div class="login-page">
    <div class="login-card" style="width:460px; max-width:calc(100vw - 32px);">
      <div class="login-logo">
        <div class="brand">NURU<span>.</span></div>
        <p>Inventory Management</p>
      </div>

      <h2>Create Account</h2>
      <p class="subtitle">Set up your inventory access</p>

      <div class="login-error" id="registerError"></div>

      <form id="registerForm" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" placeholder="e.g. Sara Bekele" required />
          </div>
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" placeholder="e.g. sara.bekele" required autocomplete="username" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="reg-password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="reg-password" placeholder="Min. 8 chars, 1 uppercase, 1 number, 1 special" required autocomplete="new-password" />
              <button type="button" class="pw-toggle" aria-label="Toggle password visibility" onclick="togglePw('reg-password', this)" tabindex="-1">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
            <div id="pw-strength" style="margin-top:6px;font-size:12px;display:flex;flex-direction:column;gap:4px;"></div>
          </div>
          <div class="form-group">
            <label for="reg-confirm">Confirm Password</label>
            <div class="pw-wrap">
              <input type="password" id="reg-confirm" placeholder="Repeat password" required autocomplete="new-password" />
              <button type="button" class="pw-toggle" aria-label="Toggle password visibility" onclick="togglePw('reg-confirm', this)" tabindex="-1">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="registerBtn">Create Account &amp; Sign In</button>
      </form>

      <p style="text-align:center; margin-top:22px; font-size:14px; color:var(--muted);">
        Already have an account?
        <a href="index.html" style="color:var(--accent); font-weight:600; text-decoration:none;">Sign in →</a>
      </p>
    </div>
  </div>
  <script src="app.js?v=202605021"></script>
  <script>
    initTheme();
    initRegisterPage();
  </script>
</body>
</html>
